name: task_management
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.1 <4.0.0' # Updated SDK constraint for compatibility with new packages

dependencies:
  flutter:
    sdk: flutter

  # State management
  file_picker: ^10.3.6
  provider: ^6.1.2

  # Database
  sqflite: ^2.3.3
  path_provider: ^2.1.3
  path: ^1.9.0

  # Notifications
  flutter_local_notifications: ^19.5.0
  timezone: ^0.10.1

  # Utilities
  intl: ^0.20.2
  csv: ^6.0.0
  pdf: ^3.11.0
  printing: ^5.12.0
  share_plus: ^12.0.1

  # Permissions & Android intents
  permission_handler: ^12.0.1 # Kept at 11.x as you had 12.0.1 which might be too new
  android_intent_plus: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/bell.mp3
    - assets/sounds/chime.mp3
    - assets/sounds/soft.mp3
