name: committe_app
description: "A committee management Flutter application with dashboard, charts, and data persistence."

# Prevent accidental publishing to pub.dev
publish_to: 'none'

# Versioning (App version + build number)
version: 1.0.0+1

# Environment SDK version
environment:
  sdk: ^3.9.2

# -------------------------------
# Dependencies
# -------------------------------
dependencies:
  flutter:
    sdk: flutter

  # Cupertino icons (for iOS-style icons)
  cupertino_icons: ^1.0.8

  # Google Fonts — used for custom fonts like Poppins, Roboto, etc.
  google_fonts: ^6.2.1

  # fl_chart — used for displaying graphs/charts on the dashboard
  fl_chart: ^0.70.0  # ✅ Updated to a newer stable version compatible with Flutter 3.9+

  # shared_preferences — for saving login data, committees, etc. locally
  shared_preferences: ^2.3.2

# -------------------------------
# Development Dependencies
# -------------------------------
dev_dependencies:
  flutter_test:
    sdk: flutter

  # Recommended lint rules to maintain clean code
  flutter_lints: ^5.0.0

# -------------------------------
# Flutter Configuration
# -------------------------------
flutter:
  # Enables use of Material Icons
  uses-material-design: true

  # To include app assets (images, JSON, etc.), uncomment and add paths like:
  # assets:
  #   - assets/images/
  #   - assets/icons/

  # To add custom fonts (if you wish later), uncomment and define here:
  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf
  #       - asset: assets/fonts/Poppins-Bold.ttf
